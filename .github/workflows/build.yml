name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # macOS — VST3 / AUv2 / CLAP / App / CLI
  # ---------------------------------------------------------------------------
  macos:
    name: macOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      # MPlug (and its mcp-ext-apps submodule) is fetched over git. Rewrite both
      # the https and git@ forms to use the PAT so private deps and ssh-style
      # submodules clone without SSH keys.
      - name: Configure git auth for private dependencies
        run: |
          git config --global url."https://x-access-token:${{ secrets.MPLUG_CI_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://x-access-token:${{ secrets.MPLUG_CI_TOKEN }}@github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: brew install ninja ccache

      - uses: hendrikmuhs/ccache-action@v1
        with:
          key: macos
          max-size: 2G

      - name: Configure
        run: >-
          cmake --preset release
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DCMAKE_OBJC_COMPILER_LAUNCHER=ccache
          -DCMAKE_OBJCXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build --preset release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MyPlugin-macos
          if-no-files-found: ignore
          path: |
            build/release/**/*.vst3
            build/release/**/*.clap
            build/release/**/*.component
            build/release/**/*.app

  # ---------------------------------------------------------------------------
  # Linux — VST3 / CLAP / App / CLI
  # ---------------------------------------------------------------------------
  linux:
    name: Linux
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Configure git auth for private dependencies
        run: |
          git config --global url."https://x-access-token:${{ secrets.MPLUG_CI_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://x-access-token:${{ secrets.MPLUG_CI_TOKEN }}@github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ccache \
            libasound2-dev libgtk-3-dev libwebkit2gtk-4.1-dev

      - uses: hendrikmuhs/ccache-action@v1
        with:
          key: linux
          max-size: 2G

      - name: Configure
        run: >-
          cmake --preset release
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build --preset release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MyPlugin-linux
          if-no-files-found: ignore
          path: |
            build/release/**/*.vst3
            build/release/**/*.clap
            build/release/out/MyPlugin

  # ---------------------------------------------------------------------------
  # Windows — VST3 / CLAP / App
  # ---------------------------------------------------------------------------
  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure git auth for private dependencies
        shell: bash
        run: |
          git config --global url."https://x-access-token:${{ secrets.MPLUG_CI_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://x-access-token:${{ secrets.MPLUG_CI_TOKEN }}@github.com/".insteadOf "git@github.com:"

      # MSVC env so the Ninja generator finds cl.exe. Ninja + sccache gives
      # cross-run compiler caching, which the VS/MSBuild generator can't use.
      - uses: ilammy/msvc-dev-cmd@v1

      - uses: hendrikmuhs/ccache-action@v1
        with:
          key: windows
          variant: sccache
          max-size: 2G

      - name: Configure
        run: >-
          cmake -B build/windows -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build build/windows

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MyPlugin-windows
          if-no-files-found: ignore
          path: |
            build/windows/**/*.vst3
            build/windows/**/*.clap
            build/windows/**/MyPlugin.exe
